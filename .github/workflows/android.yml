name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        default: 'MyApp'
        type: string
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.example.myapp'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Display inputs
        run: |
          echo "App Name: ${{ github.event.inputs.app_name }}"
          echo "Package Name: ${{ github.event.inputs.package_name }}"

      - name: Update app name in strings.xml
        run: |
          if [ -f "app/src/main/res/values/strings.xml" ]; then
            sed -i "s/<string name=\"app_name\">.*<\/string>/<string name=\"app_name\">${{ github.event.inputs.app_name }}<\/string>/" app/src/main/res/values/strings.xml
            echo "✅ Updated app name in strings.xml"
          else
            echo "⚠️ strings.xml not found"
          fi

      - name: Update package name in build.gradle
        run: |
          if [ -f "app/build.gradle" ]; then
            sed -i "s/applicationId .*/applicationId '${{ github.event.inputs.package_name }}'/" app/build.gradle
            sed -i "s/namespace .*/namespace '${{ github.event.inputs.package_name }}'/" app/build.gradle
            echo "✅ Updated package name in build.gradle"
          else
            echo "⚠️ build.gradle not found"
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Rename APK with App Name
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${{ github.event.inputs.app_name }}.apk
            echo "✅ Renamed APK to ${{ github.event.inputs.app_name }}.apk"
          else
            echo "⚠️ APK file not found"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: app/build/outputs/apk/debug/${{ github.event.inputs.app_name }}.apk
          if-no-files-found: warn
