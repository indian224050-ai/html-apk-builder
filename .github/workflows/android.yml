name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        default: 'MyApp'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.example.myapp'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Update App Name and Package Name
        run: |
          # Update app name in strings.xml
          sed -i "s/<string name=\"app_name\">.*<\/string>/<string name=\"app_name\">${{ github.event.inputs.app_name }}<\/string>/" app/src/main/res/values/strings.xml
          
          # Update package name in build.gradle
          sed -i "s/applicationId .*/applicationId '${{ github.event.inputs.package_name }}'/" app/build.gradle
          
          # Update namespace in build.gradle
          sed -i "s/namespace .*/namespace '${{ github.event.inputs.package_name }}'/" app/build.gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Rename APK with App Name
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${{ github.event.inputs.app_name }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: app/build/outputs/apk/debug/${{ github.event.inputs.app_name }}.apk
